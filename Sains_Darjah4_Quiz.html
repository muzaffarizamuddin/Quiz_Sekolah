    expBlock.className = 'experiment-block';
    expBlock.style.borderColor = section.color;

    const expHeader = document.createElement('div');
    expHeader.className = 'experiment-header';
    expHeader.style.backgroundColor = section.color;
    expHeader.innerHTML = `<span>${section.title}</span><span class="q-range">Soalan ${startQ}–${endQ}</span>`;
    expBlock.appendChild(expHeader);

    const expBody = document.createElement('div');
    expBody.className = 'experiment-body';

    const scenarioP = document.createElement('p');
    scenarioP.className = 'scenario-text';
    scenarioP.textContent = section.scenario;
    expBody.appendChild(scenarioP);

    if (section.tableHeaders) {
      const table = document.createElement('table');
      table.className = 'data-table';

      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      section.tableHeaders.forEach(h => {
        const th = document.createElement('th');
        th.textContent = h;
        th.style.backgroundColor = section.color;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      section.tableRows.forEach(row => {
        const tr = document.createElement('tr');
        row.forEach(cell => {
          const td = document.createElement('td');
          td.textContent = cell;
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      expBody.appendChild(table);
    }

    expBlock.appendChild(expBody);
    container.appendChild(expBlock);

    // Question cards
    section.questions.forEach(q => {
      const globalIdx = globalQNum - 1;
      const card = document.createElement('div');
      card.className = 'question-card';
      card.setAttribute('data-qidx', globalIdx);
      card.style.borderLeftColor = section.color;

      const tagSpan = document.createElement('span');
      tagSpan.className = 'question-tag';
      tagSpan.textContent = q.tag;
      tagSpan.style.backgroundColor = q.tagBg;
      tagSpan.style.color = q.tagColor;
      card.appendChild(tagSpan);

      const qText = document.createElement('div');
      qText.className = 'question-text';
      qText.textContent = globalQNum + '. ' + q.question;
      card.appendChild(qText);

      const optsList = document.createElement('ul');
      optsList.className = 'options-list';
      q.options.forEach((opt, oIdx) => {
        const li = document.createElement('li');
        li.className = 'option-item';
        li.textContent = opt.text;
        li.onclick = () => selectOption(globalIdx, oIdx, li);
        optsList.appendChild(li);
      });
      card.appendChild(optsList);

      const ratBox = document.createElement('div');
      ratBox.className = 'rationale';
      ratBox.id = 'rat-' + globalIdx;
      card.appendChild(ratBox);

      container.appendChild(card);
      globalQNum++;
    });
  });
}

let selections = {};

function selectOption(qIdx, oIdx, element) {
  const card = document.querySelector('[data-qidx="' + qIdx + '"]');
  card.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
  element.classList.add('selected');
  selections[qIdx] = oIdx;
}

function gradeQuiz() {
  let correctCount = 0;
  allQuestions.forEach((q, qIdx) => {
    const ratBox = document.getElementById('rat-' + qIdx);
    const selectedOIdx = selections[qIdx];

    if (selectedOIdx === undefined) {
      ratBox.className = 'rationale incorrect-fb';
      ratBox.innerHTML = '<strong>Tidak dijawab.</strong> Sila pilih satu jawapan.';
      ratBox.style.display = 'block';
      return;
    }

    const chosenOpt = q.options[selectedOIdx];
    const correctOpt = q.options.find(o => o.correct);

    if (chosenOpt.correct) {
      correctCount++;
      ratBox.className = 'rationale correct-fb';
      ratBox.innerHTML = '<strong>Betul!</strong> ' + chosenOpt.rationale;
    } else {
      ratBox.className = 'rationale incorrect-fb';
      ratBox.innerHTML = '<strong>Tidak betul.</strong> Kamu memilih: "' + chosenOpt.text + '".<br><em>Jawapan betul:</em> <strong>' + correctOpt.text + '</strong> — ' + correctOpt.rationale;
    }
    ratBox.style.display = 'block';
  });

  const total = allQuestions.length;
  const pct = Math.round((correctCount / total) * 100);
  let msg = pct >= 80 ? 'Tahniah! Kerja yang sangat bagus!' : pct >= 60 ? 'Bagus! Teruskan berlatih ya!' : 'Jangan putus asa! Cuba semula ya!';

  const scoreBanner = document.getElementById('scoreBanner');
  scoreBanner.innerHTML = 'Markah Kamu: ' + correctCount + ' / ' + total + ' (' + pct + '%) — ' + msg;
  scoreBanner.style.display = 'block';

  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('resetBtn').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetQuiz() {
  selections = {};
  document.getElementById('scoreBanner').style.display = 'none';
  document.getElementById('submitBtn').style.display = 'block';
  document.getElementById('resetBtn').style.display = 'none';
  document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.rationale').forEach(el => { el.style.display = 'none'; el.innerHTML = ''; });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.onload = renderQuiz;
</script>
